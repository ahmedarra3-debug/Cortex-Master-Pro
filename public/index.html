<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex Master Studio | Composition v1.5.1</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #0ea5e9; --gold: #f59e0b; --bg: #020617; --panel: #0f172a; --border: #1e293b; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Cairo', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 400px; background: var(--panel); border-left: 1px solid var(--border); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .brand { text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .brand h2 { color: var(--accent); margin: 0; }
        
        .section-title { font-size: 10px; color: var(--gold); letter-spacing: 2px; font-weight: 800; margin-bottom: 5px; }
        .group { border: 1px solid var(--border); border-radius: 12px; padding: 12px; background: rgba(30, 41, 59, 0.4); }
        .group-label { font-size: 12px; color: #fff; margin-bottom: 8px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        
        .mode-tabs { display: flex; background: #000; padding: 4px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 8px; border: none; background: none; color: #64748b; cursor: pointer; border-radius: 7px; font-weight: bold; font-family: 'Cairo'; }
        .tab-btn.active { background: var(--accent); color: #000; }

        select, textarea, input { width: 100%; background: #020617; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; font-size: 13px; outline: none; }
        
        .btn-launch { background: linear-gradient(135deg, var(--accent), #2563eb); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: 800; cursor: pointer; font-size: 16px; }
        .btn-new { background: #1e293b; color: #fff; border: 1px solid var(--border); padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: 700; }
        .btn-history { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: 700; }

        #historyModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background: var(--panel); width: 85%; max-width: 800px; height: 80vh; border-radius: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; }
        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .history-item { background: #020617; padding: 15px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; border-right: 4px solid transparent; }
        .history-item:hover { border-right-color: var(--accent); background: #0f172a; }

        .main-stage { flex: 1; display: flex; flex-direction: column; background: #000; }
        #chat-window { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; background: radial-gradient(circle at 50% 10%, #0f172a 0%, #020617 100%); }
        .msg { padding: 18px; border-radius: 15px; max-width: 85%; line-height: 1.7; white-space: pre-wrap; font-size: 14.5px; position: relative; }
        .ai-msg { background: rgba(15, 23, 42, 0.8); color: #e2e8f0; border-right: 4px solid var(--accent); align-self: flex-start; padding-top: 35px; }
        .user-msg { background: var(--accent); color: #000; align-self: flex-end; font-weight: 700; }
        
        #imagePreviewContainer { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 15px; min-height: 80px; border: 1px dashed rgba(212, 175, 55, 0.3); padding: 10px; border-radius: 10px; }
        .preview-wrapper { position: relative; width: 80px; height: 80px; }
        .preview-thumb { width: 100%; height: 100%; object-fit: cover; border: 2px solid var(--gold); border-radius: 8px; }
        .remove-img-btn { position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }

        .copy-btn { position: absolute; top: 8px; left: 8px; background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: bold; }
        .copy-btn:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

<div id="historyModal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="color:var(--gold);"><i class="fas fa-history"></i> آلة الزمن | سجل المحادثات</h3>
            <button onclick="closeHistory()" style="background:none; border:none; color:#fff; font-size:24px; cursor:pointer;">&times;</button>
        </div>
        <div id="historyList" class="history-list"></div>
    </div>
</div>

<aside class="sidebar">
    <div class="brand">
        <h2><i class="fas fa-film"></i> CORTEX</h2>
        <small style="color: var(--gold);">COMPOSITION v1.5.1</small>
    </div>

    <div>
        <div class="section-title">01 / نمط الإنتاج</div>
        <div class="mode-tabs">
            <button onclick="setMode('photo')" id="p-btn" class="tab-btn active">فوتوغراف</button>
            <button onclick="setMode('video')" id="v-btn" class="tab-btn">سينما</button>
        </div>
        <div class="group">
            <div class="group-label">المجال</div>
            <select id="domainSelector" onchange="syncPresets()">
                <option value="industrial">الصناعي</option>
                <option value="commercial">التجاري</option>
                <option value="agriculture">الزراعي</option>
                <option value="real_estate">العقاري</option>
                <option value="medical">الطبي</option>
            </select>
        </div>
    </div>

    <div>
        <div class="section-title">02 / القوالب</div>
        <div class="group">
            <select id="presetSelector"></select>
        </div>
        <div id="video-controls" style="display:none; margin-top:10px;">
            <div class="group">
                <div class="group-label">حركة الكاميرا</div>
                <select id="motion"><option value="Dolly Zoom">Dolly Zoom</option><option value="Orbital">Orbital 360</option></select>
            </div>
        </div>
    </div>

   <div>
    <div class="section-title">03 / الإبداع المركب</div>
    <div class="group">
        <div class="group-label"><i class="fas fa-images"></i> عناصر الإنتاج (ارفع حتى 5 صور)</div>
        <input type="file" id="refImages" accept="image/*" multiple style="margin-bottom: 10px;">
        <div id="imagePreviewContainer"></div>
        <textarea id="conceptInput" rows="3" placeholder="اشرح كيف تدمج هذه العناصر..."></textarea>
    </div>
   </div>

    <button class="btn-launch" onclick="launchProduction()">إطلاق الإنتاج</button>
    <button class="btn-new" onclick="startNewProject()"><i class="fas fa-plus"></i> مشروع جديد</button>
    <button class="btn-history" onclick="openHistory()"><i class="fas fa-history"></i> الأرشيف الحديدي</button>
</aside>

<main class="main-stage">
    <div id="chat-window"></div>
    <div class="chat-input-container" style="padding:20px; display:flex; gap:10px; background:var(--panel);">
        <input type="text" id="chatInput" style="flex:1" placeholder="اطلب تعديلاً على المشروع الحالي..." onkeypress="if(event.key==='Enter') sendUpdate()">
        <button onclick="sendUpdate()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">تحديث</button>
    </div>
</main>

<script>
    const DOMAINS_MAP = {
        industrial: ["production_line", "foundry", "viscous_flow", "mega_structures", "metal_craft"],
        commercial: ["ad_hero", "digital_tech", "gourmet", "mockup", "product_edit", "living_spaces"],
        agriculture: ["drone_survey", "export_quality", "greenhouse"],
        real_estate: ["twilight", "interior", "construction"],
        medical: ["dental_macro", "sterile_lab", "trust_portrait"]
    };

    let currentMode = 'photo';
    let allProjects = []; 
    let activeProjectId = null; 
    let selectedFiles = []; // 🌟 المخزن المركزي للصور

    // --- 1. نظام المعاينة والرفع (يعمل فوراً عند فتح الصفحة) ---
    document.getElementById('refImages').addEventListener('change', function(e) {
        const files = Array.from(e.target.files);
        if (selectedFiles.length + files.length > 5) {
            alert("مخرج أحمد، الحد الأقصى هو 5 صور فقط.");
            return;
        }
        files.forEach(file => {
            selectedFiles.push(file);
            renderPreview(file, selectedFiles.length - 1);
        });
        this.value = ""; 
    });

    function renderPreview(file, index) {
        const container = document.getElementById('imagePreviewContainer');
        const reader = new FileReader();
        reader.onload = (e) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'preview-wrapper';
            wrapper.id = `prev-${index}`;
            wrapper.innerHTML = `
                <img src="${e.target.result}" class="preview-thumb">
                <button class="remove-img-btn" onclick="removeImage(${index})">×</button>
            `;
            container.appendChild(wrapper);
        };
        reader.readAsDataURL(file);
    }

    function removeImage(index) {
        selectedFiles.splice(index, 1);
        const container = document.getElementById('imagePreviewContainer');
        container.innerHTML = '';
        selectedFiles.forEach((file, i) => renderPreview(file, i));
    }

    // --- 2. نظام الرسائل وزر النسخ الذكي ---
    function appendMsg(text, className) {
        const win = document.getElementById('chat-window');
        const d = document.createElement('div');
        d.className = `msg ${className}`;
        
        if (className === 'ai-msg') {
            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.innerHTML = '<i class="fas fa-copy"></i> نسخ البرومبت';
            btn.onclick = () => {
                const textToCopy = text.includes("Prompt:") ? text.split("Prompt:")[1].trim() : text;
                navigator.clipboard.writeText(textToCopy);
                btn.innerHTML = '<i class="fas fa-check"></i> تم النسخ!';
                setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i> نسخ البرومبت', 2000);
            };
            d.appendChild(btn);
        }

        const span = document.createElement('span');
        span.innerText = text;
        d.appendChild(span);
        win.appendChild(d);
        win.scrollTop = win.scrollHeight;
    }

    // --- 3. وظائف الإنتاج والمشاريع ---
    async function launchProduction() {
        const concept = document.getElementById('conceptInput').value;
        if (!concept) return alert("مخرج أحمد، من فضلك اكتب رؤيتك الفنية أولاً.");

        const formData = new FormData();
        formData.append('mode', currentMode);
        formData.append('domain', document.getElementById('domainSelector').value);
        formData.append('preset', document.getElementById('presetSelector').value);
        formData.append('concept', concept);
        
        if (currentMode === 'video') {
            formData.append('motion', document.getElementById('motion').value);
        }

        // شحن الصور من المخزنselectedFiles
        selectedFiles.forEach(file => {
            formData.append('refImages', file);
        });

        appendMsg(`🚀 إطلاق إنتاج مركب: ${concept}`, "user-msg");

        try {
            const res = await fetch('/produce', { method: 'POST', body: formData });
            const d = await res.json();
            if (d.projectId) activeProjectId = d.projectId;
            appendMsg(d.reply, "ai-msg");
        } catch (err) {
            appendMsg("❌ حدث خطأ في محرك الإنتاج.", "ai-msg");
        }
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('p-btn').classList.toggle('active', m === 'photo');
        document.getElementById('v-btn').classList.toggle('active', m === 'video');
        document.getElementById('video-controls').style.display = (m === 'video' ? 'block' : 'none');
    }

    function syncPresets() {
        const domain = document.getElementById('domainSelector').value;
        const selector = document.getElementById('presetSelector');
        selector.innerHTML = '';
        DOMAINS_MAP[domain].forEach(p => {
            const opt = document.createElement('option');
            opt.value = p; opt.innerText = p.replace('_', ' ').toUpperCase();
            selector.appendChild(opt);
        });
    }

    async function startNewProject() {
        if(confirm("بدء مشروع جديد؟")) {
            activeProjectId = null;
            selectedFiles = [];
            document.getElementById('imagePreviewContainer').innerHTML = '';
            document.getElementById('conceptInput').value = '';
            await fetch('/reset', { method: 'POST' });
            document.getElementById('chat-window').innerHTML = '<div class="msg ai-msg">> المكنة جاهزة لمشروع جديد.</div>';
        }
    }

    async function sendUpdate() {
        const val = document.getElementById('chatInput').value;
        if (!val || !activeProjectId) return;
        appendMsg(val, "user-msg");
        const fd = new FormData();
        fd.append('isUpdate', 'true');
        fd.append('userUpdate', val);
        fd.append('projectId', activeProjectId);
        const res = await fetch('/produce', { method: 'POST', body: fd });
        const d = await res.json();
        appendMsg(d.reply, "ai-msg");
        document.getElementById('chatInput').value = '';
    }

    // الأرشيف الحديدي
    async function openHistory() {
        const modal = document.getElementById('historyModal');
        const list = document.getElementById('historyList');
        modal.style.display = 'flex';
        const res = await fetch('/history');
        const data = await res.json();
        allProjects = data.projects;
        list.innerHTML = '';
        allProjects.forEach((proj, i) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.onclick = () => loadProjectData(i);
            div.innerHTML = `<strong>${proj.concept.substring(0, 30)}...</strong>`;
            list.appendChild(div);
        });
    }

    async function loadProjectData(index) {
        const proj = allProjects[index];
        activeProjectId = proj.id;
        document.getElementById('chat-window').innerHTML = '';
        const res = await fetch(`/project-history/${proj.id}`);
        const data = await res.json();
        data.logs.forEach(log => appendMsg(log.content, log.role === 'user' ? 'user-msg' : 'ai-msg'));
        closeHistory();
    }

    function closeHistory() { document.getElementById('historyModal').style.display = 'none'; }

    syncPresets();
    setMode('photo');
</script>
</body>
</html>
