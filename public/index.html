<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex Master Studio | Universal v1.3.1</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #0ea5e9; --gold: #f59e0b; --bg: #020617; --panel: #0f172a; --border: #1e293b; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Cairo', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 400px; background: var(--panel); border-left: 1px solid var(--border); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .brand { text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .brand h2 { color: var(--accent); margin: 0; }
        .section-title { font-size: 10px; color: var(--gold); letter-spacing: 2px; font-weight: 800; margin-bottom: 5px; }
        .group { border: 1px solid var(--border); border-radius: 12px; padding: 12px; background: rgba(30, 41, 59, 0.4); }
        .group-label { font-size: 12px; color: #fff; margin-bottom: 8px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        select, textarea, input { width: 100%; background: #020617; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; font-size: 13px; outline: none; font-family: 'Cairo'; }
        .btn-launch { background: linear-gradient(135deg, var(--accent), #2563eb); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .main-stage { flex: 1; display: flex; flex-direction: column; background: #000; }
        #chat-window { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; background: radial-gradient(circle at 50% 10%, #0f172a 0%, #020617 100%); }
        .msg { padding: 18px; border-radius: 15px; max-width: 85%; line-height: 1.7; white-space: pre-wrap; font-size: 14.5px; position: relative; }
        .ai-msg { background: rgba(15, 23, 42, 0.8); color: #e2e8f0; border-right: 4px solid var(--accent); align-self: flex-start; }
        .user-msg { background: var(--accent); color: #000; align-self: flex-end; font-weight: 700; }
        .preview-box { width: 100%; height: 100px; background: #000; border-radius: 6px; margin-top: 8px; display: none; border: 1px solid var(--accent); overflow: hidden; }
        .preview-box img { width: 100%; height: 100%; object-fit: contain; }
        .chat-input-container { padding: 20px; background: var(--panel); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .copy-btn { background: var(--gold); border: none; padding: 4px 8px; border-radius: 4px; font-size: 9px; cursor: pointer; position: absolute; top: 10px; left: 10px; font-weight: 800; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="brand">
        <h2><i class="fas fa-robot"></i> CORTEX</h2>
        <small style="color: var(--gold);">UNIVERSAL v1.3.1</small>
    </div>

    <div>
        <div class="section-title">01 / مشروع الإنتاج</div>
        <div class="group">
            <div class="group-label">المجال (Domain)</div>
            <select id="domainSelector" onchange="syncPresets()">
                <option value="industrial">الصناعي (Manufacturing)</option>
                <option value="commercial">التجاري (Commercial Studio)</option>
                <option value="agriculture">الزراعي (Green Gold)</option>
                <option value="real_estate">العقاري (Luxury Living)</option>
                <option value="medical">الطبي (Cortex Health)</option>
            </select>
        </div>
    </div>

    <div>
        <div class="section-title">02 / إعدادات الاستوديو</div>
        <div class="group">
            <div class="group-label">القوالب الذكية (Presets)</div>
            <select id="presetSelector"></select>
        </div>
    </div>

    <div>
        <div class="section-title">03 / الإدخال الإبداعي</div>
        <div class="group">
            <div class="group-label">الصورة المرجعية</div>
            <input type="file" id="refImage" accept="image/*" onchange="previewFile()">
            <div id="previewBox" class="preview-box"></div>
        </div>
        <div class="group" style="margin-top:10px;">
            <div class="group-label">الفكرة (Concept)</div>
            <textarea id="conceptInput" rows="3" placeholder="اشرح رؤيتك الفنية..."></textarea>
        </div>
    </div>

    <button class="btn-launch" onclick="launchProduction()">إطلاق الإنتاج</button>
</aside>

<main class="main-stage">
    <div id="chat-window">
        <div class="msg ai-msg">> النظام v1.3.1 جاهز. اختر المجال والقالب لنبدأ.</div>
    </div>
    <div class="chat-input-container">
        <input type="text" id="chatInput" style="flex:1" placeholder="اطلب تعديلاً..." onkeypress="if(event.key==='Enter') sendUpdate()">
        <button onclick="sendUpdate()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:800">تحديث</button>
    </div>
</main>

<script>
    // هذه البيانات يجب أن تطابق ملف domains.json تماماً
    const DOMAINS_MAP = {
        industrial: ["production_line", "foundry", "viscous_flow", "mega_structures", "metal_craft"],
        commercial: ["ad_hero", "digital_tech", "gourmet", "mockup", "product_edit", "living_spaces"],
        agriculture: ["drone_survey", "export_quality", "greenhouse"],
        real_estate: ["twilight", "interior", "construction"],
        medical: ["dental_macro", "sterile_lab", "trust_portrait"]
    };

    function syncPresets() {
        const domain = document.getElementById('domainSelector').value;
        const selector = document.getElementById('presetSelector');
        selector.innerHTML = '';
        DOMAINS_MAP[domain].forEach(p => {
            const opt = document.createElement('option');
            opt.value = p;
            opt.innerText = p.replace('_', ' ').toUpperCase();
            selector.appendChild(opt);
        });
    }

    async function launchProduction() {
        const formData = new FormData();
        formData.append('domain', document.getElementById('domainSelector').value);
        formData.append('preset', document.getElementById('presetSelector').value);
        formData.append('concept', document.getElementById('conceptInput').value);
        if (document.getElementById('refImage').files[0]) formData.append('refImage', document.getElementById('refImage').files[0]);
        
        appendMsg("🚀 جارٍ الإنتاج...", "user-msg");
        const res = await fetch('/produce', { method: 'POST', body: formData });
        const d = await res.json();
        appendMsg(d.reply, "ai-msg");
    }

    async function sendUpdate() {
        const val = document.getElementById('chatInput').value;
        if (!val) return;
        appendMsg(val, "user-msg");
        const fd = new FormData();
        fd.append('isUpdate', 'true');
        fd.append('userUpdate', val);
        fd.append('domain', document.getElementById('domainSelector').value);
        fd.append('preset', document.getElementById('presetSelector').value);
        const res = await fetch('/produce', { method: 'POST', body: fd });
        const d = await res.json();
        appendMsg(d.reply, "ai-msg");
        document.getElementById('chatInput').value = '';
    }

    function previewFile() {
        const file = document.getElementById('refImage').files[0];
        const box = document.getElementById('previewBox');
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { box.style.display = 'block'; box.innerHTML = `<img src="${e.target.result}">`; };
            reader.readAsDataURL(file);
        }
    }

    function appendMsg(t, c) {
        const win = document.getElementById('chat-window');
        const d = document.createElement('div');
        d.className = `msg ${c}`;
        d.innerText = t;
        if (c === 'ai-msg') {
            const btn = document.createElement('button');
            btn.className = 'copy-btn'; btn.innerText = 'نسخ';
            btn.onclick = () => { navigator.clipboard.writeText(t); btn.innerText = 'تم!'; };
            d.appendChild(btn);
        }
        win.appendChild(d);
        win.scrollTop = win.scrollHeight;
    }
    syncPresets();
</script>
</body>
</html>
