<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex Master Studio | Imbraotoriyet v1.5.9</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #0ea5e9; --gold: #f59e0b; --bg: #020617; --panel: #0f172a; --border: #1e293b; --text-main: #f1f5f9; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Cairo', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        .sidebar { width: 420px; background: var(--panel); border-left: 1px solid var(--border); padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        .brand { text-align: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 10px; }
        .brand h2 { color: var(--accent); margin: 0; font-weight: 800; letter-spacing: 1px; }
        .brand small { color: var(--gold); font-weight: 700; letter-spacing: 2px; }
        
        .section-title { font-size: 11px; color: var(--gold); letter-spacing: 2px; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; }
        .group { border: 1px solid var(--border); border-radius: 12px; padding: 15px; background: rgba(30, 41, 59, 0.4); margin-bottom: 5px; }
        .group-label { font-size: 13px; color: #fff; margin-bottom: 10px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        
        .mode-tabs { display: flex; background: #000; padding: 5px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; color: #64748b; cursor: pointer; border-radius: 7px; font-weight: bold; font-family: 'Cairo'; }
        .tab-btn.active { background: var(--accent); color: #000; }

        select, textarea, input { width: 100%; background: #020617; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; outline: none; font-family: 'Cairo'; }
        select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(14, 165, 233, 0.2); }
        
        .btn-launch { background: linear-gradient(135deg, var(--accent), #2563eb); color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; font-size: 17px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); margin-top: 10px; }
        .btn-launch:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-new { background: #1e293b; color: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 15px; font-weight: 700; }
        .btn-history { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: 700; }

        /* Stage Styles */
        .main-stage { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 25px; background: radial-gradient(circle at 50% 20%, #0f172a 0%, #020617 100%); }
        
        /* Messages Styling */
        .msg { padding: 20px; border-radius: 18px; max-width: 88%; line-height: 1.8; white-space: pre-wrap; font-size: 15px; position: relative; animation: fadeIn 0.3s ease; }
        .ai-msg { background: rgba(15, 23, 42, 0.9); color: #e2e8f0; border-right: 5px solid var(--accent); align-self: flex-start; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .user-msg { background: var(--accent); color: #000; align-self: flex-end; font-weight: 700; box-shadow: 0 5px 15px rgba(14, 165, 233, 0.2); }
        
        .directors-note { background: rgba(245, 158, 11, 0.1); border: 1px solid var(--gold); padding: 12px; border-radius: 10px; margin-top: 15px; color: var(--gold); font-weight: 700; }

        /* UI Helpers */
        #imagePreviewContainer { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 15px; min-height: 90px; border: 2px dashed rgba(14, 165, 233, 0.2); padding: 12px; border-radius: 12px; background: rgba(0,0,0,0.2); }
        .preview-wrapper { position: relative; width: 85px; height: 85px; }
        .preview-thumb { width: 100%; height: 100%; object-fit: cover; border: 2px solid var(--accent); border-radius: 10px; }
        .remove-img-btn { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .copy-btn { position: absolute; top: 12px; left: 12px; background: rgba(14, 165, 233, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: 800; z-index: 5; }
        .copy-btn:hover { background: var(--accent); color: #000; }

        /* Modal History */
        #historyModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal-content { background: var(--panel); width: 90%; max-width: 900px; height: 85vh; border-radius: 25px; border: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="historyModal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
            <h3 style="color:var(--gold); margin:0;"><i class="fas fa-archive"></i> إمبراطورية كورتكس | سجل المشاريع</h3>
            <button onclick="closeHistory()" style="background:none; border:none; color:#fff; font-size:28px; cursor:pointer;">&times;</button>
        </div>
        <div id="historyList" style="flex:1; overflow-y:auto; margin-top:20px; display:flex; flex-direction:column; gap:12px;"></div>
    </div>
</div>

<aside class="sidebar">
    <div class="brand">
        <h2>CORTEX MASTER</h2>
        <small>IMBRAOTORIYET v1.5.9</small>
    </div>

    <div>
        <div class="section-title">01 / نمط الإنتاج العالمي</div>
        <div class="mode-tabs">
            <button onclick="setMode('photo')" id="p-btn" class="tab-btn active"><i class="fas fa-camera"></i> فوتوغراف</button>
            <button onclick="setMode('video')" id="v-btn" class="tab-btn"><i class="fas fa-video"></i> سينما</button>
        </div>
        <div class="group">
            <div class="group-label"><i class="fas fa-microchip"></i> التخصص الإبداعي</div>
            <select id="domainSelector">
                <option value="auto">🌟 اكتشاف تلقائي ذكي (Cortex AI)</option>
                <option value="1_manufacturing">المحور الصناعي والإنتاج الثقيل</option>
                <option value="2_agriculture">الزراعة والتصدير الدولي</option>
                <option value="3_commerce_retail">التجارة والاستهلاك العام</option>
                <option value="4_logistics_shipping">اللوجستيات وحركة التجارة</option>
                <option value="5_automotive_oils">عالم السيارات وزيوت بتروجاك</option>
                <option value="6_photography_portraits">التصوير والبورتريه الاحترافي</option>
                <option value="7_media_printing">الصحافة والطباعة والإعلان</option>
                <option value="8_packaging_luxury">استيكر العبوات والمنتجات الفاخرة</option>
                <option value="9_real_estate">العقارات والإنشاءات الهندسية</option>
                <option value="10_medical_dental">الطب والجراحة والأسنان</option>
                <option value="11_cosmetics_beauty">مستحضرات التجميل والموضة</option>
                <option value="12_marketing_social">التسويق والسوشيال ميديا</option>
            </select>
        </div>
    </div>

    <div id="video-controls" style="display:none;">
        <div class="section-title">02 / لغة الكاميرا</div>
        <div class="group">
            <select id="motion">
                <option value="Cinematic Dolly In/Out">Cinematic Dolly In/Out</option>
                <option value="Orbital 360 Scan">Orbital 360 Scan</option>
                <option value="Pan & Tilt Dynamics">Pan & Tilt Dynamics</option>
                <option value="Crane Hero Shot">Crane Hero Shot</option>
            </select>
        </div>
    </div>

    <div>
        <div class="section-title">03 / مدخلات الإنتاج المركب</div>
        <div class="group">
            <div class="group-label"><i class="fas fa-upload"></i> الخامات البصرية (5 صور كحد أقصى)</div>
            <input type="file" id="refImages" accept="image/*" multiple>
            <div id="imagePreviewContainer"></div>
            <textarea id="conceptInput" rows="4" placeholder="اشرح رؤيتك هنا (مثلاً: أريد دمج علبة زيت بتروجاك في بيئة سينمائية مستقبلية مع إضاءة نيون)..." style="margin-top:10px;"></textarea>
        </div>
    </div>

    <button class="btn-launch" onclick="launchProduction()">إطلاق محرك الإنتاج</button>
    <button class="btn-new" onclick="startNewProject()"><i class="fas fa-plus"></i> مشروع جديد</button>
    <button class="btn-history" onclick="openHistory()"><i class="fas fa-history"></i> الأرشيف الحديدي</button>
</aside>

<main class="main-stage">
    <div id="chat-window">
        <div class="msg ai-msg">🎬 مرحباً بك مخرج أحمد في استوديو كورتكس v1.5.9. العقول الثلاثة في انتظار تعليماتك...</div>
    </div>
    
    <div style="padding:25px; display:flex; gap:15px; background:var(--panel); border-top: 1px solid var(--border);">
        <input type="text" id="chatInput" placeholder="اطلب تعديلاً فنياً أو إضافة تفاصيل للبرومبت..." onkeypress="if(event.key==='Enter') sendUpdate()">
        <button onclick="sendUpdate()" style="background:var(--accent); border:none; padding:0 30px; border-radius:10px; cursor:pointer; font-weight:800; color:#000;">تحديث</button>
    </div>
</main>

<script>
    let currentMode = 'photo';
    let activeProjectId = null;
    let selectedFiles = [];

    // --- 1. إدارة الصور والمعاينة ---
    document.getElementById('refImages').addEventListener('change', function(e) {
        const files = Array.from(e.target.files);
        if (selectedFiles.length + files.length > 5) return alert("الحد الأقصى 5 صور يا مخرج أحمد.");
        
        files.forEach(file => {
            selectedFiles.push(file);
            renderPreview(file, selectedFiles.length - 1);
        });
        this.value = "";
    });

    function renderPreview(file, index) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const div = document.createElement('div');
            div.className = 'preview-wrapper';
            div.id = `prev-${index}`;
            div.innerHTML = `<img src="${e.target.result}" class="preview-thumb"><button class="remove-img-btn" onclick="removeImage(${index})">&times;</button>`;
            document.getElementById('imagePreviewContainer').appendChild(div);
        };
        reader.readAsDataURL(file);
    }

    function removeImage(index) {
        selectedFiles.splice(index, 1);
        document.getElementById('imagePreviewContainer').innerHTML = '';
        selectedFiles.forEach((f, i) => renderPreview(f, i));
    }

    // --- 2. محرك الرسائل المتطور (Cinema Grade) ---
    function appendMsg(content, className) {
        const win = document.getElementById('chat-window');
        if (!win) return;

        const d = document.createElement('div');
        d.className = `msg ${className}`;

        if (className === 'ai-msg') {
            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.innerHTML = '<i class="fas fa-copy"></i> نسخ البرومبت';
            btn.onclick = () => {
                const promptMatch = content.match(/[a-zA-Z0-9\s,]{60,}/g);
                const textToCopy = promptMatch ? promptMatch[promptMatch.length - 1] : content;
                navigator.clipboard.writeText(textToCopy);
                btn.innerHTML = '<i class="fas fa-check"></i> تم!';
                setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i> نسخ البرومبت', 2000);
            };
            d.appendChild(btn);
            
            // معالجة نصيحة المخرج وتنسيق الرد
            let formattedContent = content.replace("Director's Note:", "<div class='directors-note'>🎬 نصيحة المخرج الاستشارية:</div>");
            const textContent = document.createElement('div');
            textContent.innerHTML = formattedContent;
            d.appendChild(textContent);
        } else {
            const textContent = document.createElement('span');
            textContent.innerText = content;
            d.appendChild(textContent);
        }

        win.appendChild(d);
        win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
    }

    // --- 3. عمليات الإنتاج والربط بالسيرفر ---
    async function launchProduction() {
        const concept = document.getElementById('conceptInput').value;
        if (!concept) return alert("من فضلك ادخل الرؤية الفنية أولاً.");

        const fd = new FormData();
        fd.append('mode', currentMode);
        fd.append('domain', document.getElementById('domainSelector').value);
        fd.append('concept', concept);
        if (currentMode === 'video') fd.append('motion', document.getElementById('motion').value);
        selectedFiles.forEach(f => fd.append('refImages', f));

        appendMsg(`🚀 جارٍ استدعاء مجلس العقول للإنتاج: ${concept}`, "user-msg");

        try {
            const res = await fetch('/produce', { method: 'POST', body: fd });
            const d = await res.json();
            
            if (d.success) {
                activeProjectId = d.projectId; // 🌟 تحديث الـ ID فوراً
                appendMsg(d.reply, "ai-msg");
                console.log("Active Project ID set to:", activeProjectId);
            } else {
                appendMsg("❌ فشل المحرك: " + (d.error || "خطأ غير معروف"), "ai-msg");
            }
        } catch (err) {
            appendMsg("❌ فشل الاتصال بمحرك كورتكس. تأكد من تشغيل السيرفر.", "ai-msg");
        }
    }

    async function sendUpdate() {
        const val = document.getElementById('chatInput').value;
        if (!val) return;
        if (!activeProjectId) return alert("مخرج أحمد، لا يوجد مشروع نشط حالياً للتعديل عليه. ابدأ إنتاجاً جديداً أولاً.");
        
        appendMsg(val, "user-msg");
        const fd = new FormData();
        fd.append('isUpdate', 'true');
        fd.append('userUpdate', val);
        fd.append('projectId', activeProjectId);

        try {
            const res = await fetch('/produce', { method: 'POST', body: fd });
            const d = await res.json();
            if (d.success) {
                appendMsg(d.reply, "ai-msg");
                document.getElementById('chatInput').value = '';
            } else {
                appendMsg("❌ فشل التحديث: " + d.error, "ai-msg");
            }
        } catch (err) {
            appendMsg("❌ فشل تحديث البيانات في السيرفر.", "ai-msg");
        }
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('p-btn').className = `tab-btn ${m==='photo'?'active':''}`;
        document.getElementById('v-btn').className = `tab-btn ${m==='video'?'active':''}`;
        document.getElementById('video-controls').style.display = m === 'video' ? 'block' : 'none';
    }

    async function startNewProject() {
        if(confirm("هل تريد تصفير المحرك وبدء مشروع جديد؟ (سيتم حفظ المشروع الحالي في الأرشيف)")) {
            activeProjectId = null;
            selectedFiles = [];
            document.getElementById('imagePreviewContainer').innerHTML = '';
            document.getElementById('conceptInput').value = '';
            await fetch('/reset', { method: 'POST' });
            document.getElementById('chat-window').innerHTML = '<div class="msg ai-msg">🎬 تم تصفير الذاكرة.. المكنة جاهزة لمشروعك الجديد.</div>';
        }
    }

    // --- 4. الأرشيف الحديدي (إصلاحات الاسترجاع) ---
    async function openHistory() {
        document.getElementById('historyModal').style.display = 'flex';
        const list = document.getElementById('historyList');
        list.innerHTML = '<div style="color:var(--accent); text-align:center; padding:20px;">جارٍ البحث في الأرشيف الحديدي...</div>';
        
        try {
            const res = await fetch('/history');
            const data = await res.json();
            list.innerHTML = '';
            
            if (data.projects && data.projects.length > 0) {
                data.projects.forEach(p => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.style = 'background:#020617; padding:15px; border-radius:12px; border:1px solid var(--border); cursor:pointer; color:#fff; margin-bottom:10px; transition: 0.3s;';
                    item.innerHTML = `<strong><i class="fas fa-folder-open"></i> ${p.concept ? p.concept.substring(0, 40) : "إنتاج بدون عنوان"}...</strong><br><small style="color:var(--gold)">${p.domain || 'Auto-Detect'}</small>`;
                    item.onclick = () => loadProject(p.id);
                    list.appendChild(item);
                });
            } else {
                list.innerHTML = '<div style="color:#64748b; text-align:center; padding:20px;">الأرشيف فارغ.. ابدأ أول إنتاج ليظهر هنا.</div>';
            }
        } catch (err) {
            list.innerHTML = '<div style="color:#ef4444; text-align:center; padding:20px;">❌ فشل في قراءة الدفاتر الحديدية.</div>';
        }
    }

    async function loadProject(id) {
        console.log("🎬 استدعاء المشروع رقم:", id);
        activeProjectId = id;
        const win = document.getElementById('chat-window');
        win.innerHTML = '<div class="msg ai-msg">🎬 جارٍ سحب بيانات المشروع رقم #' + id + ' من الأرشيف...</div>';
        
        try {
            const res = await fetch(`/project-history/${id}`);
            const data = await res.json();
            
            if (data.success && data.logs && data.logs.length > 0) {
                win.innerHTML = ''; // تنظيف الشاشة قبل التحميل
                data.logs.forEach(l => {
                    appendMsg(l.content, l.role === 'user' ? 'user-msg' : 'ai-msg');
                });
                console.log("✅ تم تحميل المحادثة بالكامل.");
            } else {
                win.innerHTML = '<div class="msg ai-msg">⚠️ مخرج أحمد، هذا المشروع لا يحتوي على سجلات محفوظة. (تأكد من وجود بيانات في جدول الـ logs في الداتا بيز).</div>';
            }
            closeHistory();
        } catch (err) {
            console.error("Load Error:", err);
            appendMsg("❌ عطل في استرجاع بيانات الأرشيف.", "ai-msg");
        }
    }

    function closeHistory() { document.getElementById('historyModal').style.display = 'none'; }
</script>
</body>
</html>
